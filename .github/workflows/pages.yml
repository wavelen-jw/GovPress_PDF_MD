name: Deploy Web To GitHub Pages

on:
  push:
    branches:
      - web
    paths:
      - ".github/workflows/pages.yml"
      - "mobile/**"
      - "ui/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLOUDFLARE_WEB_ANALYTICS_SNIPPET: "<!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{\"token\": \"4ed8f833f5354d4d8b630744932bcf98\"}'></script><!-- End Cloudflare Web Analytics -->"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install web dependencies
        working-directory: mobile
        run: npm ci

      - name: Build web app
        working-directory: mobile
        env:
          EXPO_PUBLIC_GOVPRESS_API_KEY: ${{ vars.EXPO_PUBLIC_GOVPRESS_API_KEY }}
        run: npm run export:web

      - name: Disable Jekyll
        run: touch mobile/dist/.nojekyll

      - name: Move app bundle to /app subdirectory
        run: |
          mkdir -p mobile/dist/app
          mv mobile/dist/_expo mobile/dist/app/_expo
          mv mobile/dist/index.html mobile/dist/app/index.html
          mv mobile/dist/metadata.json mobile/dist/app/metadata.json
          python - <<'PY'
          from pathlib import Path

          app_index = Path("mobile/dist/app/index.html")
          text = app_index.read_text(encoding="utf-8")
          text = text.replace('src="/GovPress_PDF_MD/app/_expo/', 'src="./_expo/')
          app_index.write_text(text, encoding="utf-8")
          PY

      - name: Install landing page as root index
        run: cp ui/landing.html mobile/dist/index.html

      - name: Install curated benchmark page
        run: |
          mkdir -p mobile/dist/benchmark-curated
          cp ui/benchmark-curated.html mobile/dist/benchmark-curated/index.html
          cp ui/benchmark-curated-data.js mobile/dist/benchmark-curated/benchmark-curated-data.js

      - name: Install official benchmark page
        run: |
          mkdir -p mobile/dist/benchmark-official
          cp ui/benchmark-official.html mobile/dist/benchmark-official/index.html
          cp ui/benchmark-official-data.js mobile/dist/benchmark-official/benchmark-official-data.js

      - name: Install policy briefing benchmark page
        run: |
          mkdir -p mobile/dist/benchmark-policy-briefing
          cp ui/benchmark-policy-briefing.html mobile/dist/benchmark-policy-briefing/index.html
          cp ui/benchmark-policy-briefing-data.js mobile/dist/benchmark-policy-briefing/benchmark-policy-briefing-data.js

      - name: Install comparison page (고유가 피해지원금)
        run: |
          mkdir -p mobile/dist/comparison-goilyuga
          cp ui/comparison-goilyuga.html mobile/dist/comparison-goilyuga/index.html
          cp ui/comparison-goilyuga-data.js mobile/dist/comparison-goilyuga/comparison-goilyuga-data.js
          mkdir -p mobile/dist/comparison-goilyuga/downloads
          cp artifacts/policy_briefing_benchmark/corpus_latest100/hwpxs/156754095.hwpx mobile/dist/comparison-goilyuga/downloads/156754095.hwpx
          cp artifacts/policy_briefing_benchmark/corpus_latest100/pdfs/156754095.pdf mobile/dist/comparison-goilyuga/downloads/156754095.pdf
          cp artifacts/policy_briefing_benchmark/corpus_latest100/prediction/readhim/markdown/156754095.md mobile/dist/comparison-goilyuga/downloads/readhim-156754095.md
          cp artifacts/policy_briefing_benchmark/corpus_latest100/prediction/opendataloader/markdown/156754095.md mobile/dist/comparison-goilyuga/downloads/opendataloader-156754095.md

      - name: Inject Cloudflare Web Analytics snippet
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          snippet = os.environ["CLOUDFLARE_WEB_ANALYTICS_SNIPPET"]
          root = Path("mobile/dist")
          for path in root.rglob("*.html"):
              text = path.read_text(encoding="utf-8")
              if "static.cloudflareinsights.com/beacon.min.js" in text:
                  continue
              if "</body>" in text:
                  text = text.replace("</body>", f"{snippet}\n</body>")
              else:
                  text = f"{text}\n{snippet}\n"
              path.write_text(text, encoding="utf-8")
              print(path)
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mobile/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add deployment metadata summary
        run: |
          set -euo pipefail
          {
            echo "## Deployment Metadata"
            echo
            echo "- Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
            echo "- Pages URL: ${{ steps.deployment.outputs.page_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
