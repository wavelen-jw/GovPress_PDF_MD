name: Deploy Web To GitHub Pages

on:
  push:
    branches:
      - web
    paths:
      - ".github/workflows/pages.yml"
      - "mobile/**"
      - "ui/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install web dependencies
        working-directory: mobile
        run: npm ci

      - name: Build web app
        working-directory: mobile
        env:
          EXPO_PUBLIC_GOVPRESS_API_KEY: ${{ vars.EXPO_PUBLIC_GOVPRESS_API_KEY }}
        run: npm run export:web

      - name: Disable Jekyll
        run: touch mobile/dist/.nojekyll

      - name: Move app bundle to /app subdirectory
        run: |
          mkdir -p mobile/dist/app
          mv mobile/dist/_expo mobile/dist/app/_expo
          mv mobile/dist/index.html mobile/dist/app/index.html
          mv mobile/dist/metadata.json mobile/dist/app/metadata.json

      - name: Install landing page as root index
        run: cp ui/landing.html mobile/dist/index.html

      - name: Install curated benchmark page
        run: |
          mkdir -p mobile/dist/benchmark-curated
          cp ui/benchmark-curated.html mobile/dist/benchmark-curated/index.html
          cp ui/benchmark-curated-data.js mobile/dist/benchmark-curated/benchmark-curated-data.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mobile/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add deployment metadata summary
        run: |
          set -euo pipefail
          {
            echo "## Deployment Metadata"
            echo
            echo "- Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
            echo "- Pages URL: ${{ steps.deployment.outputs.page_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
