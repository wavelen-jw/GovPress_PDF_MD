name: Deploy Web To GitHub Pages

on:
  push:
    branches:
      - web
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify prebuilt web artifact
        run: test -f mobile/dist/index.html

      - name: Disable Jekyll
        run: touch mobile/dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mobile/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add deployment metadata summary
        run: |
          set -euo pipefail
          {
            echo "## Deployment Metadata"
            echo
            echo "- Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
            echo "- Pages URL: ${{ steps.deployment.outputs.page_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
