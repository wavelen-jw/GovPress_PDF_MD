name: Set ServerW Admin Key

on:
  workflow_dispatch

permissions:
  contents: read

jobs:
  set-admin-key:
    name: "Set GOVPRESS_ADMIN_API_KEY on ServerW"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Materialize SSH key
        env:
          SSH_KEY: ${{ secrets.GOVPRESS_W_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          KEY_FILE=~/.ssh/deploy_key

          if printf '%s' "$SSH_KEY" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            printf '%s\n' "$SSH_KEY" | tr -d '\r' > "$KEY_FILE"
          else
            printf '%s' "$SSH_KEY" | tr -d '\r\n ' | base64 -d > "$KEY_FILE"
          fi

          chmod 600 "$KEY_FILE"
          ssh-keygen -lf "$KEY_FILE"

      - name: Configure SSH to use Cloudflare Tunnel
        env:
          SSH_HOST: ${{ vars.GOVPRESS_W_SSH_HOST }}
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config << EOF
          Host ${SSH_HOST}
            StrictHostKeyChecking accept-new
            Port 2222
            ProxyCommand /bin/sh -lc 'cloudflared access ssh --hostname %h --service-token-id ${CF_ID} --service-token-secret ${CF_SECRET}'
          EOF

      - name: Check ServerW paths
        env:
          USER: ${{ secrets.GOVPRESS_W_USER }}
          SSH_HOST: ${{ vars.GOVPRESS_W_SSH_HOST }}
          DEPLOY_DIR: ${{ vars.GOVPRESS_W_DEPLOY_DIR }}
        run: |
          set -euo pipefail
          KEY_FILE=~/.ssh/deploy_key

          echo "=== Checking paths on ServerW ==="
          ssh -T -i "$KEY_FILE" -o IdentitiesOnly=yes -o BatchMode=yes "$USER@$SSH_HOST" \
            bash -s "$DEPLOY_DIR" <<'BASH'
          set -euo pipefail
          DEPLOY_DIR="$1"

          echo "DEPLOY_DIR: $DEPLOY_DIR"
          echo ""
          echo "Listing deploy directory:"
          ls -la "$DEPLOY_DIR/" || echo "DEPLOY_DIR not found"
          echo ""
          echo "Checking .env path:"
          ENV_PATH="${DEPLOY_DIR}/deploy/wsl/.env"
          echo "ENV_PATH: $ENV_PATH"
          ls -la "$ENV_PATH" 2>/dev/null && echo "✓ .env found" || echo "✗ .env NOT found"
          echo ""
          echo "Checking docker-compose.yml path:"
          COMPOSE_PATH="${DEPLOY_DIR}/deploy/wsl/docker-compose.yml"
          echo "COMPOSE_PATH: $COMPOSE_PATH"
          ls -la "$COMPOSE_PATH" 2>/dev/null && echo "✓ docker-compose.yml found" || echo "✗ docker-compose.yml NOT found"
          echo ""
          echo "Listing deploy/wsl/ directory:"
          ls -la "$DEPLOY_DIR/deploy/wsl/" 2>/dev/null || echo "deploy/wsl not found"
          BASH

      - name: Update .env with GOVPRESS_ADMIN_API_KEY
        env:
          USER: ${{ secrets.GOVPRESS_W_USER }}
          SSH_HOST: ${{ vars.GOVPRESS_W_SSH_HOST }}
          DEPLOY_DIR: ${{ vars.GOVPRESS_W_DEPLOY_DIR }}
          ADMIN_KEY: ${{ secrets.GOVPRESS_ADMIN_API_KEY || 'd2a03584cc0a209ecc3a0e28a1fecdcc13c8a5c9d2955cf989e71631a5cfa739' }}
        run: |
          set -euo pipefail
          KEY_FILE=~/.ssh/deploy_key

          # .env 파일 경로
          ENV_PATH="${DEPLOY_DIR}/deploy/wsl/.env"

          # 리모트 커맨드: GOVPRESS_ADMIN_API_KEY를 .env에 추가 또는 업데이트
          REMOTE_CMD=$(cat <<'BASH'
            set -euo pipefail
            ENV_PATH="$1"
            ADMIN_KEY="$2"

            if [ ! -f "$ENV_PATH" ]; then
              echo "Error: $ENV_PATH not found" >&2
              exit 1
            fi

            # 이미 GOVPRESS_ADMIN_API_KEY가 있으면 업데이트, 없으면 추가
            if grep -q "^GOVPRESS_ADMIN_API_KEY=" "$ENV_PATH"; then
              sed -i "s/^GOVPRESS_ADMIN_API_KEY=.*/GOVPRESS_ADMIN_API_KEY=$ADMIN_KEY/" "$ENV_PATH"
              echo "Updated GOVPRESS_ADMIN_API_KEY in $ENV_PATH"
            else
              echo "GOVPRESS_ADMIN_API_KEY=$ADMIN_KEY" >> "$ENV_PATH"
              echo "Added GOVPRESS_ADMIN_API_KEY to $ENV_PATH"
            fi

            # 파일 확인
            echo "Current GOVPRESS_ADMIN_API_KEY in .env:"
            grep "GOVPRESS_ADMIN_API_KEY" "$ENV_PATH" || echo "Not found"
          BASH
          )

          ssh -T -i "$KEY_FILE" -o IdentitiesOnly=yes -o BatchMode=yes "$USER@$SSH_HOST" \
            bash -s "$ENV_PATH" "$ADMIN_KEY" <<'BASH'
          set -euo pipefail
          ENV_PATH="$1"
          ADMIN_KEY="$2"

          if [ ! -f "$ENV_PATH" ]; then
            echo "Error: $ENV_PATH not found" >&2
            exit 1
          fi

          # 이미 GOVPRESS_ADMIN_API_KEY가 있으면 업데이트, 없으면 추가
          if grep -q "^GOVPRESS_ADMIN_API_KEY=" "$ENV_PATH"; then
            sed -i "s/^GOVPRESS_ADMIN_API_KEY=.*/GOVPRESS_ADMIN_API_KEY=$ADMIN_KEY/" "$ENV_PATH"
            echo "Updated GOVPRESS_ADMIN_API_KEY in $ENV_PATH"
          else
            echo "GOVPRESS_ADMIN_API_KEY=$ADMIN_KEY" >> "$ENV_PATH"
            echo "Added GOVPRESS_ADMIN_API_KEY to $ENV_PATH"
          fi

          # 파일 확인
          echo "Current GOVPRESS_ADMIN_API_KEY in .env:"
          grep "GOVPRESS_ADMIN_API_KEY" "$ENV_PATH" || echo "Not found"
          BASH

      - name: Restart ServerW service
        env:
          USER: ${{ secrets.GOVPRESS_W_USER }}
          SSH_HOST: ${{ vars.GOVPRESS_W_SSH_HOST }}
          DEPLOY_DIR: ${{ vars.GOVPRESS_W_DEPLOY_DIR }}
        run: |
          set -euo pipefail
          KEY_FILE=~/.ssh/deploy_key

          ssh -T -i "$KEY_FILE" -o IdentitiesOnly=yes -o BatchMode=yes "$USER@$SSH_HOST" \
            bash -s "$DEPLOY_DIR" <<'BASH'
          set -euo pipefail
          DEPLOY_DIR="$1"

          # docker compose 재시작
          cd "$DEPLOY_DIR" || exit 1
          docker compose -f deploy/wsl/docker-compose.yml up -d --no-build

          # 헬스체크
          sleep 3
          curl -s http://127.0.0.1:8080/health || echo "Health check pending..."
          BASH

      - name: Verify admin key
        env:
          ADMIN_KEY: ${{ secrets.GOVPRESS_ADMIN_API_KEY || 'd2a03584cc0a209ecc3a0e28a1fecdcc13c8a5c9d2955cf989e71631a5cfa739' }}
        run: |
          set -euo pipefail
          sleep 2

          # 캐시 리셋 API 호출로 검증
          curl -X POST "https://api4.govpress.cloud/v1/policy-briefings/cache/reset" \
            -H "X-Admin-Key: $ADMIN_KEY" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n" \
            -s | head -20

      - name: Summary
        run: |
          {
            echo "✅ ServerW GOVPRESS_ADMIN_API_KEY update complete"
            echo ""
            echo "- Server: api4.govpress.cloud"
            echo "- Environment: \`deploy/wsl/.env\`"
            echo "- Service: Restarted"
            echo ""
            echo "Cache reset API is now available with admin key."
          } >> "$GITHUB_STEP_SUMMARY"
