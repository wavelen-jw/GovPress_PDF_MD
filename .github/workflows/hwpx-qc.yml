name: Converter Contract Smoke

on:
  push:
    branches:
      - web
    paths:
      - ".github/workflows/hwpx-qc.yml"
      - "deploy/**"
      - "packages/govpress-converter/**"
      - "scripts/check_converter_runtime.py"
      - "server/app/adapters/conversion_engine.py"
      - "tests/test_conversion_engine.py"
      - "tests/test_converter_runtime_smoke.py"
  pull_request:
    paths:
      - ".github/workflows/hwpx-qc.yml"
      - "deploy/**"
      - "packages/govpress-converter/**"
      - "scripts/check_converter_runtime.py"
      - "server/app/adapters/conversion_engine.py"
      - "tests/test_conversion_engine.py"
      - "tests/test_converter_runtime_smoke.py"
  workflow_dispatch:

jobs:
  converter-contract-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run converter contract tests
        run: |
          pytest -q tests/test_conversion_engine.py tests/test_converter_runtime_smoke.py
