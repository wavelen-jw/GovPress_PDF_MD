name: HWPX QC

on:
  push:
    branches:
      - web
    paths:
      - ".github/workflows/hwpx-qc.yml"
      - "scripts/run_hwpx_qc.py"
      - "src/hwpx_converter.py"
      - "src/hwpx_postprocessor.py"
      - "src/markdown_postprocessor.py"
      - "src/parser_rules.py"
      - "src/report_postprocessor.py"
      - "src/hwpx_qc_*.py"
      - "server/app/adapters/policy_briefing.py"
      - "tests/test_hwpx_qc.py"
      - "tests/test_hwpx_and_markdown_postprocessor.py"
      - "tests/qc_samples/**"
      - ".agents/skills/hwpx-md-qc/**"
      - "docs/hwpx-md-qc.md"
      - "README.md"
      - "requirements.txt"
  pull_request:
    paths:
      - ".github/workflows/hwpx-qc.yml"
      - "scripts/run_hwpx_qc.py"
      - "src/hwpx_converter.py"
      - "src/hwpx_postprocessor.py"
      - "src/markdown_postprocessor.py"
      - "src/parser_rules.py"
      - "src/report_postprocessor.py"
      - "src/hwpx_qc_*.py"
      - "server/app/adapters/policy_briefing.py"
      - "tests/test_hwpx_qc.py"
      - "tests/test_hwpx_and_markdown_postprocessor.py"
      - "tests/qc_samples/**"
      - ".agents/skills/hwpx-md-qc/**"
      - "docs/hwpx-md-qc.md"
      - "README.md"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  hwpx-qc:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run HWPX QC regression
        run: |
          python3 scripts/run_hwpx_qc.py regression \
            --root tests/qc_samples \
            --json-out tmp/hwpx-qc/results.json \
            --judge-json-out tmp/hwpx-qc/judge-payloads.json

      - name: Upload HWPX QC artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hwpx-qc-${{ github.run_id }}
          path: tmp/hwpx-qc/
          if-no-files-found: ignore
