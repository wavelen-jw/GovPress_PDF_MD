name: Policy Briefing QC Monitor

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Target date in YYYY-MM-DD. Leave blank for today."
        required: false
        type: string
      limit:
        description: "Maximum number of policy briefings to export."
        required: false
        default: "5"
        type: string
      qc_root:
        description: "QC sample root inside gov-md-converter."
        required: false
        default: "tests/manual_samples/policy_briefings"
        type: string
      open_issue_on_failure:
        description: "Open or update a GitHub issue when QC requires review."
        required: false
        default: true
        type: boolean
      send_telegram_on_failure:
        description: "Send a Telegram alert when QC requires review."
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "15 4 * * *"

permissions:
  contents: read
  issues: write

jobs:
  policy-briefing-qc-monitor:
    runs-on: ubuntu-latest
    env:
      GOVPRESS_POLICY_BRIEFING_SERVICE_KEY: ${{ secrets.GOVPRESS_POLICY_BRIEFING_SERVICE_KEY }}
      GOVPRESS_STORAGE_ROOT: ${{ github.workspace }}/storage
      GOV_MD_CONVERTER_ROOT: ${{ github.workspace }}/gov-md-converter
      GOVPRESS_QC_EXPORT_ROOT: ${{ github.workspace }}/gov-md-converter/exports/policy_briefing_qc
      GOVPRESS_CURATED_QC_ROOT: ${{ github.workspace }}/gov-md-converter/tests/qc_samples
      TARGET_DATE: ${{ inputs.target_date }}
      EXPORT_LIMIT: ${{ inputs.limit || '5' }}
      QC_ROOT: ${{ inputs.qc_root || 'tests/manual_samples/policy_briefings' }}
      OPEN_ISSUE_ON_FAILURE: ${{ inputs.open_issue_on_failure != false }}
      SEND_TELEGRAM_ON_FAILURE: ${{ inputs.send_telegram_on_failure != false }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Check out GovPress_PDF_MD
        uses: actions/checkout@v4

      - name: Check out private gov-md-converter
        uses: actions/checkout@v4
        with:
          repository: wavelen-jw/gov-md-converter
          token: ${{ secrets.GOV_MD_CONVERTER_REPO_TOKEN }}
          path: gov-md-converter

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            gov-md-converter/pyproject.toml

      - name: Install GovPress_PDF_MD dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Install gov-md-converter
        run: |
          pip install -e ./gov-md-converter

      - name: Resolve target date
        id: resolve-date
        run: |
          if [ -n "${TARGET_DATE}" ]; then
            echo "target_date=${TARGET_DATE}" >> "$GITHUB_OUTPUT"
          else
            echo "target_date=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run policy briefing QC pipeline
        run: |
          python scripts/run_policy_briefing_qc_pipeline.py \
            --date "${{ steps.resolve-date.outputs.target_date }}" \
            --output-root "${GOVPRESS_QC_EXPORT_ROOT}" \
            --limit "${EXPORT_LIMIT}" \
            --gov-md-converter-root "${GOV_MD_CONVERTER_ROOT}" \
            --qc-root "${QC_ROOT}"

      - name: Evaluate pipeline report
        id: evaluate
        run: |
          REPORT_PATH="${GOVPRESS_QC_EXPORT_ROOT}/${{ steps.resolve-date.outputs.target_date }}/pipeline_report.json"
          SUMMARY_PATH="${GOVPRESS_QC_EXPORT_ROOT}/${{ steps.resolve-date.outputs.target_date }}/qc_summary.md"
          set +e
          python "${GOV_MD_CONVERTER_ROOT}/scripts/evaluate_policy_briefing_qc_report.py" \
            "$REPORT_PATH" \
            --summary-markdown "$SUMMARY_PATH"
          EXIT_CODE=$?
          set -e
          echo "report_path=$REPORT_PATH" >> "$GITHUB_OUTPUT"
          echo "summary_path=$SUMMARY_PATH" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Append QC summary to workflow summary
        if: always()
        run: |
          if [ -f "${{ steps.evaluate.outputs.summary_path }}" ]; then
            cat "${{ steps.evaluate.outputs.summary_path }}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build QC dashboard
        if: always()
        run: |
          python "${GOV_MD_CONVERTER_ROOT}/scripts/build_policy_briefing_qc_dashboard.py" \
            --root "${GOVPRESS_QC_EXPORT_ROOT}" \
            --output-html "${GOVPRESS_QC_EXPORT_ROOT}/dashboard/index.html" \
            --output-json "${GOVPRESS_QC_EXPORT_ROOT}/dashboard/dashboard.json" \
            --curated-root "${GOVPRESS_CURATED_QC_ROOT}"

      - name: Upload QC artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-briefing-qc-${{ steps.resolve-date.outputs.target_date }}
          path: |
            gov-md-converter/exports/policy_briefing_qc/${{ steps.resolve-date.outputs.target_date }}/pipeline_report.json
            gov-md-converter/exports/policy_briefing_qc/${{ steps.resolve-date.outputs.target_date }}/qc_summary.md
            gov-md-converter/exports/policy_briefing_qc/${{ steps.resolve-date.outputs.target_date }}/issue_payload.json
            gov-md-converter/exports/policy_briefing_qc/${{ steps.resolve-date.outputs.target_date }}/gov_md_reports/**
            gov-md-converter/exports/policy_briefing_qc/dashboard/**
          if-no-files-found: warn

      - name: Build issue payload
        if: always() && steps.evaluate.outputs.exit_code != '0'
        run: |
          python "${GOV_MD_CONVERTER_ROOT}/scripts/build_policy_briefing_qc_issue.py" \
            "${{ steps.evaluate.outputs.report_path }}" \
            --summary-markdown "${{ steps.evaluate.outputs.summary_path }}" \
            --output "${GOVPRESS_QC_EXPORT_ROOT}/${{ steps.resolve-date.outputs.target_date }}/issue_payload.json"

      - name: Create or update QC issue
        id: create-or-update-qc-issue
        if: always() && steps.evaluate.outputs.exit_code != '0' && env.OPEN_ISSUE_ON_FAILURE == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const payloadPath = 'gov-md-converter/exports/policy_briefing_qc/${{ steps.resolve-date.outputs.target_date }}/issue_payload.json';
            const payload = JSON.parse(fs.readFileSync(payloadPath, 'utf8'));
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((issue) =>
              issue.title === payload.title || (issue.body || '').includes(payload.marker)
            );
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title: payload.title,
                body: payload.body,
              });
              core.setOutput('issue_url', existing.html_url);
              core.summary.addRaw(`Updated issue #${existing.number}\n`).write();
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title: payload.title,
                body: payload.body,
              });
              core.setOutput('issue_url', created.data.html_url);
              core.summary.addRaw(`Created issue #${created.data.number}\n`).write();
            }

      - name: Send Telegram alert
        if: always() && steps.evaluate.outputs.exit_code != '0' && env.SEND_TELEGRAM_ON_FAILURE == 'true' && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        run: |
          python "${GOV_MD_CONVERTER_ROOT}/scripts/send_policy_briefing_qc_telegram.py" \
            "${{ steps.evaluate.outputs.report_path }}" \
            --dashboard-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --issue-url "${{ steps.create-or-update-qc-issue.outputs.issue_url }}"

      - name: Fail when QC requires review
        if: always()
        run: |
          if [ "${{ steps.evaluate.outputs.exit_code }}" != "0" ]; then
            echo "Policy briefing QC monitor detected review-required or failing samples."
            exit "${{ steps.evaluate.outputs.exit_code }}"
          fi
