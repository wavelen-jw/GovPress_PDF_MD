name: Deploy API To Servers

on:
  push:
    branches:
      - web
    paths:
      - ".github/workflows/vps.yml"
      - ".github/workflows/_deploy-server.yml"
      - ".github/workflows/_deploy-server-cf.yml"
      - "deploy/**"
      - "requirements.txt"
      - "server/**"
      - "src/**"
      - "!src/hwpx_qc_*.py"
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: true

# ── 서버별 시크릿/변수 규칙 ──────────────────────────────────────────
#
# 서버V (api2.govpress.cloud) — VPS, 직접 SSH
#   Secrets : GOVPRESS_VPS_HOST, GOVPRESS_VPS_USER, GOVPRESS_VPS_SSH_KEY
#   Variables: GOVPRESS_VPS_PORT, GOVPRESS_VPS_DEPLOY_DIR,
#              GOVPRESS_VPS_SERVICE, GOVPRESS_VPS_HEALTHCHECK_URL,
#              GOVPRESS_VPS_BRANCH
#
# 서버H (api.govpress.cloud) — WSL, Cloudflare Tunnel SSH
#   Secrets : GOVPRESS_H_USER, GOVPRESS_H_SSH_KEY,
#             CF_ACCESS_CLIENT_ID, CF_ACCESS_CLIENT_SECRET
#   Variables: GOVPRESS_H_SSH_HOST (e.g. ssh-h.govpress.cloud),
#              GOVPRESS_H_DEPLOY_DIR, GOVPRESS_H_SERVICE,
#              GOVPRESS_H_HEALTHCHECK_URL, GOVPRESS_H_BRANCH,
#              GOVPRESS_H_COMPOSE_FILE
#
# 서버W (api4.govpress.cloud) — WSL, Cloudflare Tunnel SSH
#   Secrets : GOVPRESS_W_USER, GOVPRESS_W_SSH_KEY,
#             CF_ACCESS_CLIENT_ID, CF_ACCESS_CLIENT_SECRET (공용)
#   Variables: GOVPRESS_W_SSH_HOST (e.g. ssh-w.govpress.cloud),
#              GOVPRESS_W_DEPLOY_DIR, GOVPRESS_W_SERVICE,
#              GOVPRESS_W_HEALTHCHECK_URL, GOVPRESS_W_BRANCH,
#              GOVPRESS_W_COMPOSE_FILE
#
# 서버H/W는 GOVPRESS_H_DEPLOY_DIR / GOVPRESS_W_DEPLOY_DIR 변수가
# 설정되어 있을 때만 실행됩니다. 미설정 시 해당 잡은 건너뜁니다.
# WSL 머신이 오프라인이어도 continue-on-error: true 로 전체 워크플로우는
# 실패하지 않습니다.
# ────────────────────────────────────────────────────────────────────

jobs:

  deploy-v:
    name: "서버V (VPS)"
    uses: ./.github/workflows/_deploy-server.yml
    with:
      target_sha:      ${{ github.sha }}
      port:            ${{ vars.GOVPRESS_VPS_PORT || '22' }}
      deploy_dir:      ${{ vars.GOVPRESS_VPS_DEPLOY_DIR }}
      branch:          ${{ vars.GOVPRESS_VPS_BRANCH || 'web' }}
      service:         ${{ vars.GOVPRESS_VPS_SERVICE }}
      healthcheck_url: ${{ vars.GOVPRESS_VPS_HEALTHCHECK_URL || 'http://127.0.0.1:8013/health' }}
    secrets:
      host:    ${{ secrets.GOVPRESS_VPS_HOST }}
      user:    ${{ secrets.GOVPRESS_VPS_USER }}
      ssh_key: ${{ secrets.GOVPRESS_VPS_SSH_KEY }}
      converter_spec: ${{ secrets.GOVPRESS_CONVERTER_SPEC }}
      admin_api_key: ${{ secrets.GOVPRESS_ADMIN_API_KEY }}
      policy_briefing_service_key: ${{ secrets.GOVPRESS_POLICY_BRIEFING_SERVICE_KEY }}

  deploy-h:
    name: "서버H (WSL, CF Tunnel)"
    if: ${{ vars.GOVPRESS_H_DEPLOY_DIR != '' }}
    uses: ./.github/workflows/_deploy-server-cf.yml
    with:
      target_sha:      ${{ github.sha }}
      ssh_host:        ${{ vars.GOVPRESS_H_SSH_HOST }}
      deploy_dir:      ${{ vars.GOVPRESS_H_DEPLOY_DIR }}
      branch:          ${{ vars.GOVPRESS_H_BRANCH || 'web' }}
      compose_file:    ${{ vars.GOVPRESS_H_COMPOSE_FILE || 'deploy/wsl/docker-compose.host-proxy.yml' }}
      deploy_mode:     host_proxy
      healthcheck_url: ${{ vars.GOVPRESS_H_HEALTHCHECK_URL || 'http://127.0.0.1:8080/health' }}
      deploy_poll_attempts: "120"
      deploy_poll_interval_seconds: "5"
      emit_failure_diagnostics_only: "true"
      run_policy_probe: "true"
    secrets:
      user:             ${{ secrets.GOVPRESS_H_USER }}
      ssh_key:          ${{ secrets.GOVPRESS_H_SSH_KEY }}
      cf_client_id:     ${{ secrets.CF_ACCESS_CLIENT_ID }}
      cf_client_secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      converter_spec:   ${{ secrets.GOVPRESS_CONVERTER_SPEC }}
      admin_api_key:    ${{ secrets.GOVPRESS_ADMIN_API_KEY }}
      policy_briefing_service_key: ${{ secrets.GOVPRESS_POLICY_BRIEFING_SERVICE_KEY }}

  deploy-w:
    name: "서버W (WSL, CF Tunnel)"
    if: ${{ vars.GOVPRESS_W_DEPLOY_DIR != '' }}
    uses: ./.github/workflows/_deploy-server-cf.yml
    with:
      target_sha:      ${{ github.sha }}
      ssh_host:        ${{ vars.GOVPRESS_W_SSH_HOST }}
      deploy_dir:      ${{ vars.GOVPRESS_W_DEPLOY_DIR }}
      branch:          ${{ vars.GOVPRESS_W_BRANCH || 'web' }}
      compose_file:    ${{ vars.GOVPRESS_W_COMPOSE_FILE || 'deploy/wsl/docker-compose.host-proxy.yml' }}
      deploy_mode:     host_proxy
      healthcheck_url: ${{ vars.GOVPRESS_W_HEALTHCHECK_URL || 'http://127.0.0.1:8080/health' }}
      emit_failure_diagnostics_only: "true"
      run_policy_probe: "true"
    secrets:
      user:             ${{ secrets.GOVPRESS_W_USER }}
      ssh_key:          ${{ secrets.GOVPRESS_W_SSH_KEY }}
      cf_client_id:     ${{ secrets.CF_ACCESS_CLIENT_ID }}
      cf_client_secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      converter_spec:   ${{ secrets.GOVPRESS_CONVERTER_SPEC }}
      admin_api_key:    ${{ secrets.GOVPRESS_ADMIN_API_KEY }}
      policy_briefing_service_key: ${{ secrets.GOVPRESS_POLICY_BRIEFING_SERVICE_KEY }}

  converter-drift-smoke:
    name: "Converter Drift Smoke"
    if: ${{ needs.deploy-v.result == 'success' && needs.deploy-h.result == 'success' && needs.deploy-w.result == 'success' }}
    needs:
      - deploy-v
      - deploy-h
      - deploy-w
    runs-on: ubuntu-latest
    steps:
      - name: Materialize deploy key
        env:
          VPS_KEY: ${{ secrets.GOVPRESS_VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          KEY_FILE=~/.ssh/deploy_key
          if printf '%s' "$VPS_KEY" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            printf '%s\n' "$VPS_KEY" | tr -d '\r' > "$KEY_FILE"
          else
            printf '%s' "$VPS_KEY" | tr -d '\r\n ' | base64 -d > "$KEY_FILE"
          fi
          chmod 600 "$KEY_FILE"
          ssh-keygen -y -f "$KEY_FILE" > /dev/null

      - name: Add serverV to known_hosts
        env:
          HOST: ${{ secrets.GOVPRESS_VPS_HOST }}
          PORT: ${{ vars.GOVPRESS_VPS_PORT || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "${PORT}" -H "$HOST" >> ~/.ssh/known_hosts

      - name: Compare conversion hashes from serverV
        env:
          HOST: ${{ secrets.GOVPRESS_VPS_HOST }}
          USER: ${{ secrets.GOVPRESS_VPS_USER }}
          PORT: ${{ vars.GOVPRESS_VPS_PORT || '22' }}
          DEPLOY_DIR: ${{ vars.GOVPRESS_VPS_DEPLOY_DIR }}
        run: |
          set -euo pipefail
          KEY_FILE=~/.ssh/deploy_key
          ssh -T -i "$KEY_FILE" -o IdentitiesOnly=yes -o BatchMode=yes -p "$PORT" "$USER@$HOST" \
            "cd '$DEPLOY_DIR' && '$DEPLOY_DIR/.venv/bin/python' '$DEPLOY_DIR/scripts/compare_converter_hashes_via_ssh.py' \
              --deploy-dir '$DEPLOY_DIR' \
              --sample-rel 'artifacts/policy_briefing_benchmark/corpus_latest100/hwpxs/156754103.hwpx'" \
            | tee converter-drift-smoke.json

      - name: Summarize conversion hashes
        if: always()
        run: |
          set -euo pipefail
          if [ ! -f converter-drift-smoke.json ]; then
            echo "- converter drift smoke did not produce output" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("converter-drift-smoke.json").read_text(encoding="utf-8"))
          rows = payload["results"]
          print("| server | text_sha256 | length |")
          print("| --- | --- | --- |")
          lines = [
              "| server | text_sha256 | length |",
              "| --- | --- | --- |",
          ]
          for row in rows:
              line = (
                  f"| {row['name']} | `{row['text_sha256']}` | `{row['length']}` |"
              )
              print(line)
              lines.append(line)
          Path("_converter_drift_summary.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          cat _converter_drift_summary.md >> "$GITHUB_STEP_SUMMARY"

  notify-deploy-failure:
    name: "Notify Deploy Failure"
    if: ${{ always() && (needs.deploy-v.result == 'failure' || needs.deploy-h.result == 'failure' || needs.deploy-w.result == 'failure' || needs.converter-drift-smoke.result == 'failure') }}
    needs:
      - deploy-v
      - deploy-h
      - deploy-w
      - converter-drift-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Send Telegram alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RESULTS_JSON: >-
            {"serverV":"${{ needs.deploy-v.result }}","serverH":"${{ needs.deploy-h.result }}","serverW":"${{ needs.deploy-w.result }}","converterSmoke":"${{ needs.converter-drift-smoke.result }}"}
        run: |
          set -euo pipefail
          python3 scripts/send_deploy_alert.py \
            --run-url "$RUN_URL" \
            --run-id "$RUN_ID" \
            --sha "$SHA" \
            --branch "$BRANCH" \
            --repo "$REPO" \
            --results-json "$RESULTS_JSON"
