name: _Deploy Server (Reusable)

on:
  workflow_call:
    inputs:
      target_sha:
        type: string
        required: true
      port:
        type: string
        default: "22"
      deploy_dir:
        type: string
        required: true
      branch:
        type: string
        default: "web"
      service:
        type: string
        required: true
      healthcheck_url:
        type: string
        default: "http://127.0.0.1:8013/health"
    secrets:
      host:
        required: true
      user:
        required: true
      ssh_key:
        required: true
      converter_spec:
        required: false
      admin_api_key:
        required: false
      policy_briefing_service_key:
        required: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Materialize deploy key
        env:
          VPS_KEY: ${{ secrets.ssh_key }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          KEY_FILE=~/.ssh/deploy_key

          if printf '%s' "$VPS_KEY" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            printf '%s\n' "$VPS_KEY" | tr -d '\r' > "$KEY_FILE"
          else
            printf '%s' "$VPS_KEY" | tr -d '\r\n ' | base64 -d > "$KEY_FILE"
          fi

          chmod 600 "$KEY_FILE"
          ssh-keygen -y -f "$KEY_FILE" > /dev/null

      - name: Add server to known_hosts
        env:
          HOST: ${{ secrets.host }}
          PORT: ${{ inputs.port }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "${PORT}" -H "$HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          HOST: ${{ secrets.host }}
          USER: ${{ secrets.user }}
          PORT: ${{ inputs.port }}
          DEPLOY_DIR: ${{ inputs.deploy_dir }}
          BRANCH: ${{ inputs.branch }}
          TARGET_SHA: ${{ inputs.target_sha }}
          SERVICE: ${{ inputs.service }}
          HEALTHCHECK_URL: ${{ inputs.healthcheck_url }}
          CONVERTER_SPEC: ${{ secrets.converter_spec }}
          ADMIN_API_KEY: ${{ secrets.admin_api_key }}
          POLICY_BRIEFING_SERVICE_KEY: ${{ secrets.policy_briefing_service_key }}
        run: |
          set -euo pipefail
          KEY_FILE=~/.ssh/deploy_key
          SSH_BASE_OPTS=(-T -i "$KEY_FILE" -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=20)
          LOCAL_SCRIPT=deploy/common/remote-deploy-cf.sh
          REMOTE_DIR="/tmp/govpress-remote-deploy-${GITHUB_RUN_ID:-manual}"
          REMOTE_PATH="${REMOTE_DIR}/remote-deploy.sh"
          REMOTE_LOG="${REMOTE_DIR}/remote-deploy.log"
          REMOTE_STATUS="${REMOTE_DIR}/status.env"
          LAUNCH_CMD="$(printf "export DEPLOY_DIR=%q BRANCH=%q TARGET_SHA=%q COMPOSE_FILE='' DEPLOY_MODE='' SERVICE=%q HEALTHCHECK_URL=%q CONVERTER_SPEC=%q ADMIN_API_KEY=%q POLICY_BRIEFING_SERVICE_KEY=%q; remote_dir=%q; remote_path=%q; remote_log=%q; remote_status=%q; mkdir -p \"\$remote_dir\"; rm -f \"\$remote_status\"; cat > \"\$remote_path\" && chmod 700 \"\$remote_path\" && { ( /bin/bash --noprofile --norc \"\$remote_path\" > \"\$remote_log\" 2>&1; rc=\$?; printf 'exit_code=%%s\\n' \"\$rc\" > \"\$remote_status\"; rm -f \"\$remote_path\" ) </dev/null >/dev/null 2>&1 & printf 'launch_pid=%%s\\n' \"\$!\"; }; printf 'remote_log=%%s\\n' \"\$remote_log\"; printf 'remote_status=%%s\\n' \"\$remote_status\"" "$DEPLOY_DIR" "$BRANCH" "$TARGET_SHA" "$SERVICE" "$HEALTHCHECK_URL" "$CONVERTER_SPEC" "$ADMIN_API_KEY" "$POLICY_BRIEFING_SERVICE_KEY" "$REMOTE_DIR" "$REMOTE_PATH" "$REMOTE_LOG" "$REMOTE_STATUS")"
          POLL_CMD="$(printf "if [ -f %q ]; then cat %q; fi" "$REMOTE_STATUS" "$REMOTE_STATUS")"
          FETCH_CMD="$(printf "if [ -f %q ]; then cat %q; fi" "$REMOTE_LOG" "$REMOTE_LOG")"
          ssh "${SSH_BASE_OPTS[@]}" -p "$PORT" "$USER@$HOST" "$LAUNCH_CMD" > remote-launch.log 2>&1 < "$LOCAL_SCRIPT"
          grep -q '^launch_pid=' remote-launch.log

          deploy_exit=1
          for attempt in $(seq 1 20); do
            ssh "${SSH_BASE_OPTS[@]}" -p "$PORT" "$USER@$HOST" "$POLL_CMD" > remote-deploy.log 2>&1 || true
            if grep -q '^exit_code=0$' remote-deploy.log; then
              deploy_exit=0
              break
            fi
            if grep -q '^exit_code=' remote-deploy.log; then
              deploy_exit=1
              break
            fi
            sleep 3
          done

          ssh "${SSH_BASE_OPTS[@]}" -p "$PORT" "$USER@$HOST" "$FETCH_CMD" > remote-deploy.log 2>&1 || true
          if [ "$deploy_exit" -ne 0 ] && [ -s remote-deploy.log ]; then
            if grep -q '^deploy-complete$' remote-deploy.log && grep -q '^deploy_probe_code=200$' remote-deploy.log; then
              echo "deploy_exit_override=remote_log_success" >> remote-deploy.log
              deploy_exit=0
            fi
          fi
          tail -n 200 remote-deploy.log || true
          test "$deploy_exit" -eq 0

      - name: Summary
        if: always()
        run: |
          {
            echo "- Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
            echo "- Branch: \`${{ inputs.branch }}\`"
            echo "- Service: \`${{ inputs.service }}\`"
            echo "- Host: \`${{ secrets.host }}\`"
            echo ""
            echo '```text'
            cat remote-deploy.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect remote diagnostics
        if: always()
        shell: bash
        env:
          DEPLOY_DIR: ${{ inputs.deploy_dir }}
          BRANCH: ${{ inputs.branch }}
        run: |
          set -euo pipefail
          if [ ! -f remote-deploy.log ]; then
            echo "remote-deploy.log missing" >&2
            exit 0
          fi

          remote_host="$(sed -n 's/^remote_host=//p' remote-deploy.log | tail -n1)"
          remote_user="$(sed -n 's/^remote_user=//p' remote-deploy.log | tail -n1)"
          target_sha="$(sed -n 's/^target_sha=//p' remote-deploy.log | tail -n1)"
          git_branch="$(sed -n 's/^git_branch=//p' remote-deploy.log | tail -n1)"
          git_head="$(sed -n 's/^git_head=//p' remote-deploy.log | tail -n1)"
          git_origin="$(sed -n 's/^git_origin=//p' remote-deploy.log | tail -n1)"
          health_probe_code="$(sed -n 's/^health_probe_code=//p' remote-deploy.log | tail -n1)"
          deploy_probe_name="$(sed -n 's/^deploy_probe_name=//p' remote-deploy.log | tail -n1)"
          deploy_probe_code="$(sed -n 's/^deploy_probe_code=//p' remote-deploy.log | tail -n1)"
          health_probe_body="$(sed -n 's/^health_probe_body=//p' remote-deploy.log | tail -n1)"

          {
            echo "remote_host=${remote_host}"
            echo "remote_user=${remote_user}"
            echo "deploy_dir=${DEPLOY_DIR}"
            echo "target_branch=${BRANCH}"
            echo "target_sha=${target_sha}"
            echo "git_branch=${git_branch}"
            echo "git_head=${git_head}"
            echo "git_origin=${git_origin}"
            echo "health_probe_code=${health_probe_code}"
            echo "deploy_probe_name=${deploy_probe_name}"
            echo "deploy_probe_code=${deploy_probe_code}"
            echo "health_probe_body=${health_probe_body}"
          } > remote-diagnostics.env

      - name: Emit remote deploy log tail
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f remote-deploy.log ]; then
            echo "::warning file=.github,title=remote deploy log::remote-deploy.log missing"
            exit 0
          fi

          tail_text="$(tail -n 20 remote-deploy.log | tr '\n' ' ' | sed 's/  */ /g' | cut -c1-1200)"
          echo "::warning file=.github,title=remote deploy log::$tail_text"

      - name: Emit remote diagnostics annotation
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f remote-diagnostics.env ]; then
            echo "::warning file=.github,title=remote diagnostics::remote-diagnostics.env missing"
            exit 0
          fi

          remote_host="$(sed -n 's/^remote_host=//p' remote-diagnostics.env | tail -n1)"
          deploy_dir="$(sed -n 's/^deploy_dir=//p' remote-diagnostics.env | tail -n1)"
          git_branch="$(sed -n 's/^git_branch=//p' remote-diagnostics.env | tail -n1)"
          target_sha="$(sed -n 's/^target_sha=//p' remote-diagnostics.env | tail -n1)"
          git_head="$(sed -n 's/^git_head=//p' remote-diagnostics.env | tail -n1)"
          health_probe_code="$(sed -n 's/^health_probe_code=//p' remote-diagnostics.env | tail -n1)"
          health_probe_body="$(sed -n 's/^health_probe_body=//p' remote-diagnostics.env | tail -n1)"

          message="remote_host=${remote_host:-unknown}; deploy_dir=${deploy_dir:-unknown}; git_branch=${git_branch:-unknown}; target_sha=${target_sha:-unknown}; git_head=${git_head:-unknown}; health_probe_code=${health_probe_code:-unknown}; health_probe_body=${health_probe_body:-unknown}"
          echo "::warning file=.github,title=remote diagnostics::$message"

      - name: Verify remote deploy result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f remote-diagnostics.env ]; then
            echo "::warning file=.github,title=remote diagnostics::remote-diagnostics.env missing; skipping final verification because deploy step already determines job result"
            exit 0
          fi

          target_sha="$(sed -n 's/^target_sha=//p' remote-diagnostics.env | tail -n1)"
          git_head="$(sed -n 's/^git_head=//p' remote-diagnostics.env | tail -n1)"
          deploy_probe_code="$(sed -n 's/^deploy_probe_code=//p' remote-diagnostics.env | tail -n1)"

          if [ -z "$target_sha" ]; then
            echo "remote deploy revision missing" >&2
            exit 1
          fi
          if [ "$target_sha" != "${{ inputs.target_sha }}" ]; then
            echo "remote target sha mismatch: ${target_sha} != ${{ inputs.target_sha }}" >&2
            exit 1
          fi
          if [ -n "$git_head" ] && [ "$git_head" != "$target_sha" ]; then
            echo "remote git head mismatch: ${git_head} != ${target_sha}" >&2
            exit 1
          fi
          if [ -n "$deploy_probe_code" ] && [ "$deploy_probe_code" != "200" ]; then
            echo "remote deploy probe failed: ${deploy_probe_code}" >&2
            exit 1
          fi
