name: _Deploy Server (Reusable)

on:
  workflow_call:
    inputs:
      port:
        type: string
        default: "22"
      deploy_dir:
        type: string
        required: true
      branch:
        type: string
        default: "web"
      service:
        type: string
        required: true
      healthcheck_url:
        type: string
        default: "http://127.0.0.1:8013/health"
    secrets:
      host:
        required: true
      user:
        required: true
      ssh_key:
        required: true
      converter_spec:
        required: false
      admin_api_key:
        required: false
      policy_briefing_service_key:
        required: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Materialize deploy key
        env:
          VPS_KEY: ${{ secrets.ssh_key }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          KEY_FILE=~/.ssh/deploy_key

          if printf '%s' "$VPS_KEY" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            printf '%s\n' "$VPS_KEY" | tr -d '\r' > "$KEY_FILE"
          else
            printf '%s' "$VPS_KEY" | tr -d '\r\n ' | base64 -d > "$KEY_FILE"
          fi

          chmod 600 "$KEY_FILE"
          ssh-keygen -y -f "$KEY_FILE" > /dev/null

      - name: Add server to known_hosts
        env:
          HOST: ${{ secrets.host }}
          PORT: ${{ inputs.port }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "${PORT}" -H "$HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          HOST: ${{ secrets.host }}
          USER: ${{ secrets.user }}
          PORT: ${{ inputs.port }}
          DEPLOY_DIR: ${{ inputs.deploy_dir }}
          BRANCH: ${{ inputs.branch }}
          SERVICE: ${{ inputs.service }}
          HEALTHCHECK_URL: ${{ inputs.healthcheck_url }}
          CONVERTER_SPEC: ${{ secrets.converter_spec }}
          ADMIN_API_KEY: ${{ secrets.admin_api_key }}
          POLICY_BRIEFING_SERVICE_KEY: ${{ secrets.policy_briefing_service_key }}
        run: |
          set -euo pipefail
          KEY_FILE=~/.ssh/deploy_key

          ssh -T -i "$KEY_FILE" -o IdentitiesOnly=yes -o BatchMode=yes -p "$PORT" "$USER@$HOST" /bin/bash --noprofile --norc <<EOF 2>&1 | tee remote-deploy.log
          set -euo pipefail
          echo "=== govpress remote diagnostics ==="
          echo "remote_host=\$(hostname)"
          echo "remote_user=\$(whoami)"
          echo "deploy_dir=$DEPLOY_DIR"
          echo "target_branch=${BRANCH}"
          git -C "$DEPLOY_DIR" fetch origin
          git -C "$DEPLOY_DIR" checkout "$BRANCH"
          git -C "$DEPLOY_DIR" reset --hard "origin/$BRANCH"
          echo "git_branch=\$(git -C "$DEPLOY_DIR" branch --show-current)"
          echo "git_head=\$(git -C "$DEPLOY_DIR" rev-parse HEAD)"
          echo "target_sha=\$(git -C "$DEPLOY_DIR" rev-parse HEAD)"
          echo "git_origin=\$(git -C "$DEPLOY_DIR" remote get-url origin)"
          CONVERTER_VERSION_FILE="$DEPLOY_DIR/deploy/converter.version"
          CONVERTER_SPEC_RESOLVER="$DEPLOY_DIR/deploy/common/resolve_converter_spec.py"
          if [ -n "${CONVERTER_SPEC}" ] && [ -f "\$CONVERTER_VERSION_FILE" ] && [ -f "\$CONVERTER_SPEC_RESOLVER" ]; then
            CONVERTER_SPEC="$(python3 "\$CONVERTER_SPEC_RESOLVER" --spec "$CONVERTER_SPEC" --version-file "\$CONVERTER_VERSION_FILE")"
            echo "converter_version=\$(cat "\$CONVERTER_VERSION_FILE")"
          fi
          rm -f \
            "$DEPLOY_DIR"/storage/results/*.md \
            "$DEPLOY_DIR/deploy/vps/data/storage/results/"*.md \
            "$DEPLOY_DIR/storage/policy_briefing_cache/index.json" \
            "$DEPLOY_DIR"/storage/policy_briefing_cache/originals/* \
            "$DEPLOY_DIR/deploy/vps/data/storage/policy_briefing_cache/index.json" \
            "$DEPLOY_DIR"/deploy/vps/data/storage/policy_briefing_cache/originals/* \
            2>/dev/null || true
          echo "converter_cache_reset=results_and_policy_briefing_cache"
          ENV_FILE="$DEPLOY_DIR/deploy/vps/.env"
          touch "\$ENV_FILE"
          if [ -n "${CONVERTER_SPEC}" ]; then
            python3 -c 'from pathlib import Path; import sys; env_path = Path(sys.argv[1]); spec = sys.argv[2]; lines = env_path.read_text().splitlines() if env_path.exists() else []; updated = []; seen_spec = False; seen_fallback = False; [updated.append(f"GOVPRESS_CONVERTER_SPEC={spec}") or (seen_spec := True) if line.startswith("GOVPRESS_CONVERTER_SPEC=") else updated.append("GOVPRESS_CONVERTER_ALLOW_LOCAL_FALLBACK=0") or (seen_fallback := True) if line.startswith("GOVPRESS_CONVERTER_ALLOW_LOCAL_FALLBACK=") else updated.append(line) for line in lines]; updated.append(f"GOVPRESS_CONVERTER_SPEC={spec}") if not seen_spec else None; updated.append("GOVPRESS_CONVERTER_ALLOW_LOCAL_FALLBACK=0") if not seen_fallback else None; env_path.write_text("\n".join(updated).rstrip() + "\n")' "\$ENV_FILE" "$CONVERTER_SPEC"
          fi
          if [ -n "${ADMIN_API_KEY}" ]; then
            python3 -c 'from pathlib import Path; import sys; env_path = Path(sys.argv[1]); key = sys.argv[2]; lines = env_path.read_text().splitlines() if env_path.exists() else []; updated = []; seen = False; [updated.append(f"GOVPRESS_ADMIN_API_KEY={key}") or (seen := True) if line.startswith("GOVPRESS_ADMIN_API_KEY=") else updated.append(line) for line in lines]; updated.append(f"GOVPRESS_ADMIN_API_KEY={key}") if not seen else None; env_path.write_text("\n".join(updated).rstrip() + "\n")' "\$ENV_FILE" "$ADMIN_API_KEY"
          fi
          if [ -n "${POLICY_BRIEFING_SERVICE_KEY}" ]; then
            python3 -c 'from pathlib import Path; import sys; env_path = Path(sys.argv[1]); key = sys.argv[2]; lines = env_path.read_text().splitlines() if env_path.exists() else []; updated = []; seen_key = False; seen_flag = False; [updated.append(f"GOVPRESS_POLICY_BRIEFING_SERVICE_KEY={key}") or (seen_key := True) if line.startswith("GOVPRESS_POLICY_BRIEFING_SERVICE_KEY=") else updated.append("GOVPRESS_ALLOW_DEFAULT_POLICY_BRIEFING_SERVICE_KEY_FALLBACK=0") or (seen_flag := True) if line.startswith("GOVPRESS_ALLOW_DEFAULT_POLICY_BRIEFING_SERVICE_KEY_FALLBACK=") else updated.append(line) for line in lines]; updated.append(f"GOVPRESS_POLICY_BRIEFING_SERVICE_KEY={key}") if not seen_key else None; updated.append("GOVPRESS_ALLOW_DEFAULT_POLICY_BRIEFING_SERVICE_KEY_FALLBACK=0") if not seen_flag else None; env_path.write_text("\n".join(updated).rstrip() + "\n")' "\$ENV_FILE" "$POLICY_BRIEFING_SERVICE_KEY"
          fi
          if [ ! -x "$DEPLOY_DIR/.venv/bin/python" ]; then
            python3 -m venv "$DEPLOY_DIR/.venv"
          fi
          "$DEPLOY_DIR/.venv/bin/python" -m pip install -U pip -q
          "$DEPLOY_DIR/.venv/bin/python" -m pip install -r "$DEPLOY_DIR/requirements.txt" -q
          "$DEPLOY_DIR/.venv/bin/python" -m pip install -U opendataloader-pdf -q
          if [ -n "${CONVERTER_SPEC}" ]; then
            "$DEPLOY_DIR/.venv/bin/python" - "$ENV_FILE" <<'PY'
from pathlib import Path
import subprocess
import sys

env_path = Path(sys.argv[1])
spec = ""
for line in env_path.read_text().splitlines():
    if line.startswith("GOVPRESS_CONVERTER_SPEC="):
        spec = line.split("=", 1)[1].strip()
        break
if not spec:
    raise SystemExit("GOVPRESS_CONVERTER_SPEC missing from env file")
subprocess.check_call([sys.executable, "-m", "pip", "install", spec, "-q"])
PY
          fi
          sudo -n systemctl restart "$SERVICE"
          health_code=""
          for _ in 1 2 3 4 5; do
            health_code="\$(curl -sS -o /tmp/govpress-health.txt -w '%{http_code}' "$HEALTHCHECK_URL" || true)"
            if [ "\$health_code" = "200" ]; then
              break
            fi
            sleep 3
          done
          echo "health_probe_code=\$health_code"
          echo "health_probe_body=\$(head -c 200 /tmp/govpress-health.txt | tr '\n' ' ' || true)"
          systemctl --no-pager --full status "$SERVICE" | sed -n '1,30p' || sudo -n systemctl --no-pager --full status "$SERVICE" | sed -n '1,30p' || true
          echo "deploy-complete"
          EOF

      - name: Summary
        if: always()
        run: |
          {
            echo "- Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
            echo "- Branch: \`${{ inputs.branch }}\`"
            echo "- Service: \`${{ inputs.service }}\`"
            echo "- Host: \`${{ secrets.host }}\`"
            echo ""
            echo '```text'
            cat remote-deploy.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect remote diagnostics
        if: always()
        shell: bash
        env:
          DEPLOY_DIR: ${{ inputs.deploy_dir }}
          BRANCH: ${{ inputs.branch }}
        run: |
          set -euo pipefail
          if [ ! -f remote-deploy.log ]; then
            echo "remote-deploy.log missing" >&2
            exit 0
          fi

          remote_host="$(sed -n 's/^remote_host=//p' remote-deploy.log | tail -n1)"
          remote_user="$(sed -n 's/^remote_user=//p' remote-deploy.log | tail -n1)"
          target_sha="$(sed -n 's/^target_sha=//p' remote-deploy.log | tail -n1)"
          git_branch="$(sed -n 's/^git_branch=//p' remote-deploy.log | tail -n1)"
          git_head="$(sed -n 's/^git_head=//p' remote-deploy.log | tail -n1)"
          git_origin="$(sed -n 's/^git_origin=//p' remote-deploy.log | tail -n1)"
          health_probe_code="$(sed -n 's/^health_probe_code=//p' remote-deploy.log | tail -n1)"
          health_probe_body="$(sed -n 's/^health_probe_body=//p' remote-deploy.log | tail -n1)"

          {
            echo "remote_host=${remote_host}"
            echo "remote_user=${remote_user}"
            echo "deploy_dir=${DEPLOY_DIR}"
            echo "target_branch=${BRANCH}"
            echo "target_sha=${target_sha}"
            echo "git_branch=${git_branch}"
            echo "git_head=${git_head}"
            echo "git_origin=${git_origin}"
            echo "health_probe_code=${health_probe_code}"
            echo "health_probe_body=${health_probe_body}"
          } > remote-diagnostics.env

      - name: Emit remote deploy log tail
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f remote-deploy.log ]; then
            echo "::warning file=.github,title=remote deploy log::remote-deploy.log missing"
            exit 0
          fi

          tail_text="$(tail -n 20 remote-deploy.log | tr '\n' ' ' | sed 's/  */ /g' | cut -c1-1200)"
          echo "::warning file=.github,title=remote deploy log::$tail_text"

      - name: Emit remote diagnostics annotation
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f remote-diagnostics.env ]; then
            echo "::warning file=.github,title=remote diagnostics::remote-diagnostics.env missing"
            exit 0
          fi

          remote_host="$(sed -n 's/^remote_host=//p' remote-diagnostics.env | tail -n1)"
          deploy_dir="$(sed -n 's/^deploy_dir=//p' remote-diagnostics.env | tail -n1)"
          git_branch="$(sed -n 's/^git_branch=//p' remote-diagnostics.env | tail -n1)"
          target_sha="$(sed -n 's/^target_sha=//p' remote-diagnostics.env | tail -n1)"
          git_head="$(sed -n 's/^git_head=//p' remote-diagnostics.env | tail -n1)"
          health_probe_code="$(sed -n 's/^health_probe_code=//p' remote-diagnostics.env | tail -n1)"
          health_probe_body="$(sed -n 's/^health_probe_body=//p' remote-diagnostics.env | tail -n1)"

          message="remote_host=${remote_host:-unknown}; deploy_dir=${deploy_dir:-unknown}; git_branch=${git_branch:-unknown}; target_sha=${target_sha:-unknown}; git_head=${git_head:-unknown}; health_probe_code=${health_probe_code:-unknown}; health_probe_body=${health_probe_body:-unknown}"
          echo "::warning file=.github,title=remote diagnostics::$message"

      - name: Verify remote deploy result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f remote-diagnostics.env ]; then
            echo "remote-diagnostics.env missing" >&2
            exit 1
          fi

          target_sha="$(sed -n 's/^target_sha=//p' remote-diagnostics.env | tail -n1)"
          git_head="$(sed -n 's/^git_head=//p' remote-diagnostics.env | tail -n1)"
          health_probe_code="$(sed -n 's/^health_probe_code=//p' remote-diagnostics.env | tail -n1)"

          if [ -z "$target_sha" ]; then
            echo "remote deploy revision missing" >&2
            exit 1
          fi
          if [ -n "$git_head" ] && [ "$git_head" != "$target_sha" ]; then
            echo "remote git head mismatch: ${git_head} != ${target_sha}" >&2
            exit 1
          fi
          if [ -n "$health_probe_code" ] && [ "$health_probe_code" != "200" ]; then
            echo "remote health probe failed: ${health_probe_code}" >&2
            exit 1
          fi
