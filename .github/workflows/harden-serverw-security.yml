name: Harden ServerW Security

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  harden-serverw:
    name: "Ensure ServerW policy key and service health"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Materialize SSH key
        env:
          SSH_KEY: ${{ secrets.GOVPRESS_W_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          KEY_FILE=~/.ssh/deploy_key
          if printf '%s' "$SSH_KEY" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            printf '%s\n' "$SSH_KEY" | tr -d '\r' > "$KEY_FILE"
          else
            printf '%s' "$SSH_KEY" | tr -d '\r\n ' | base64 -d > "$KEY_FILE"
          fi
          chmod 600 "$KEY_FILE"
          ssh-keygen -lf "$KEY_FILE"

      - name: Configure SSH to use Cloudflare Tunnel
        env:
          SSH_HOST: ${{ vars.GOVPRESS_W_SSH_HOST }}
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config << EOF
          Host ${SSH_HOST}
            StrictHostKeyChecking accept-new
            Port 2222
            ProxyCommand /bin/sh -lc 'cloudflared access ssh --hostname %h --service-token-id ${CF_ID} --service-token-secret ${CF_SECRET}'
          EOF

      - name: Ensure policy key and verify service health
        env:
          USER: ${{ secrets.GOVPRESS_W_USER }}
          SSH_HOST: ${{ vars.GOVPRESS_W_SSH_HOST }}
          DEPLOY_DIR: ${{ vars.GOVPRESS_W_DEPLOY_DIR }}
          POLICY_KEY: ${{ secrets.GOVPRESS_POLICY_BRIEFING_SERVICE_KEY }}
        run: |
          set -euo pipefail
          KEY_FILE=~/.ssh/deploy_key

          ssh -T -i "$KEY_FILE" -o IdentitiesOnly=yes -o BatchMode=yes "$USER@$SSH_HOST" \
            bash -s "$DEPLOY_DIR" "$POLICY_KEY" <<'BASH'
          set -euo pipefail
          DEPLOY_DIR="$1"
          POLICY_KEY="$2"
          ENV_PATH="${DEPLOY_DIR}/deploy/wsl/.env"

          test -f "$ENV_PATH"

          if grep -q "^GOVPRESS_POLICY_BRIEFING_SERVICE_KEY=" "$ENV_PATH"; then
            sed -i "s|^GOVPRESS_POLICY_BRIEFING_SERVICE_KEY=.*|GOVPRESS_POLICY_BRIEFING_SERVICE_KEY=$POLICY_KEY|" "$ENV_PATH"
          else
            printf '\nGOVPRESS_POLICY_BRIEFING_SERVICE_KEY=%s\n' "$POLICY_KEY" >> "$ENV_PATH"
          fi

          cd "$DEPLOY_DIR"
          sudo systemctl restart govpress-compose.service govpress-caddy.service govpress-cloudflared.service
          sleep 5

          API_KEY="$(grep '^GOVPRESS_API_KEY=' "$ENV_PATH" | cut -d= -f2-)"
          curl -fsS http://127.0.0.1:8013/health >/dev/null
          curl -fsS http://127.0.0.1:8080/health >/dev/null
          curl -fsS -H "X-API-Key: $API_KEY" "http://127.0.0.1:8013/v1/policy-briefings/today?date=2026-04-08" >/dev/null

          echo "=== effective env ==="
          grep '^GOVPRESS_POLICY_BRIEFING_SERVICE_KEY=' "$ENV_PATH" | sed 's/=.*$/=***REDACTED***/'
          echo "=== processes ==="
          pgrep -af 'cloudflared|host_proxy.py|sshd'
          BASH

      - name: Verify public policy endpoint
        run: |
          set -euo pipefail
          curl -fsS -I https://api4.govpress.cloud/health

      - name: Summary
        run: |
          {
            echo "✅ ServerW hardening applied"
            echo ""
            echo "- Ensured GOVPRESS_POLICY_BRIEFING_SERVICE_KEY exists in deploy/wsl/.env"
            echo "- Restarted GovPress services and verified health"
            echo "- Direct SSH 443 hardening remains a separate root-level step"
          } >> "$GITHUB_STEP_SUMMARY"
