<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>정부 보고서.Markdown — 서비스 점검 중</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #4f8ef7;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: calc(100% - 32px);
      text-align: center;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 20px;
      display: block;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(79, 142, 247, 0.12);
      border: 1px solid rgba(79, 142, 247, 0.3);
      color: var(--accent);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    footer {
      margin-top: 36px;
      font-size: 0.78rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🔧</span>
    <h1>서비스 점검 중</h1>
    <p class="subtitle">
      더 나은 서비스를 위해 현재 점검 작업을 진행하고 있습니다.<br>
      빠른 시일 내에 다시 이용하실 수 있도록 준비하겠습니다.
    </p>
    <div class="badge">
      <span class="dot"></span>
      작업 진행 중
    </div>
    <footer>정부 보고서.Markdown &nbsp;·&nbsp; GovPress</footer>
  </div>
</body>
</html>
