<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>GovPress Mobile</title>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  <script>
  /* ── GovPress dual-server fallback ──────────────────────────────────── */
  (function () {
    'use strict';

    var SERVERS = [
      { key: 'wsl', label: 'WSL 서버',  url: 'https://api.govpress.cloud' },
      { key: 'vps', label: 'VPS 서버',  url: 'https://api2.govpress.cloud' }
    ];
    var KEYS = { primary: 'govpress.server.primary', appBase: 'govpress.mobile.baseUrl' };

    function getPrimaryKey() { return localStorage.getItem(KEYS.primary) || 'wsl'; }
    function getUrlByKey(k)  { return (SERVERS.find(function(s){ return s.key===k; }) || SERVERS[0]).url; }
    function getPrimaryUrl() { return getUrlByKey(getPrimaryKey()); }

    /* 1. localStorage 가로채기 */
    var _origGet = Storage.prototype.getItem;
    Storage.prototype.getItem = function(key) {
      if (key === KEYS.appBase) return getPrimaryUrl();
      return _origGet.call(this, key);
    };

    /* 2. 패널 */
    var PANEL_ID = 'gp-server-panel';

    function buildPanel() {
      var el = document.createElement('div');
      el.id = PANEL_ID;
      el.setAttribute('style',
        'position:fixed;inset:0;z-index:99999;display:none;' +
        'justify-content:center;align-items:center;background:rgba(34,25,18,.45)');

      var selectedKey = getPrimaryKey();

      function rowHtml(s) {
        var sel = s.key === selectedKey;
        return [
          '<label data-key="', s.key, '" style="display:flex;align-items:center;gap:12px;',
            'padding:12px 14px;border-radius:12px;margin-bottom:8px;cursor:pointer;',
            'border:1.5px solid ', sel ? '#d4a36a' : 'transparent', ';',
            'background:', sel ? '#fff0e0' : '#f5ede2', '">',
            '<div class="gp-radio" style="width:16px;height:16px;border-radius:50%;flex-shrink:0;',
              'border:2px solid ', sel ? '#c07a30' : '#bba88a', ';',
              'background:', sel ? '#c07a30' : 'transparent', '"></div>',
            '<div style="flex:1;min-width:0">',
              '<div style="font-size:13px;font-weight:700;color:', sel ? '#2f2318' : '#7b664f', '">',
                s.label,
                '<span style="font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;',
                  'margin-left:7px;background:', sel ? '#d4a36a' : '#c8baa8', ';color:#fff">',
                  sel ? '기본' : '대체',
                '</span>',
              '</div>',
              '<div style="font-size:11px;color:#9a856e;margin-top:2px;',
                'overflow:hidden;text-overflow:ellipsis;white-space:nowrap">', s.url, '</div>',
            '</div>',
          '</label>'
        ].join('');
      }

      function render() {
        el.innerHTML = [
          '<div style="width:min(420px,90vw);background:#fff8f1;border:1px solid #e3d1ba;',
            'border-radius:20px;padding:22px 20px;box-shadow:0 8px 32px rgba(0,0,0,.18);',
            'font-family:system-ui,sans-serif">',

          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">',
            '<span style="font-size:14px;font-weight:800;color:#7b664f">서버 설정</span>',
            '<button id="gp-close" style="background:none;border:none;cursor:pointer;',
              'font-size:20px;color:#7b664f;padding:0 4px">✕</button>',
          '</div>',

          '<div id="gp-rows">', SERVERS.map(rowHtml).join(''), '</div>',

          '<p style="font-size:11px;color:#9e8676;margin:4px 0 14px;line-height:1.5">',
            '선택한 서버가 기본, 나머지가 대체 서버가 됩니다.<br>',
            '기본 서버 2초 내 무응답 시 대체로 자동 전환됩니다.',
          '</p>',

          '<div id="gp-status" style="font-size:12px;color:#7b664f;margin-bottom:12px;',
            'min-height:18px"></div>',

          '<button id="gp-save" style="width:100%;padding:12px;background:#2f6f6f;',
            'border:none;border-radius:12px;font-size:14px;font-weight:700;',
            'color:#fff;cursor:pointer">저장</button>',
          '</div>'
        ].join('');

        /* 라디오 클릭 */
        el.querySelectorAll('label[data-key]').forEach(function(lbl) {
          lbl.addEventListener('click', function() {
            selectedKey = lbl.dataset.key;
            el.querySelector('#gp-rows').innerHTML = SERVERS.map(rowHtml).join('');
            attachRowEvents();
          });
        });

        el.querySelector('#gp-close').onclick = function() { el.style.display = 'none'; };
        el.querySelector('#gp-save').onclick = function() {
          localStorage.setItem(KEYS.primary, selectedKey);
          el.style.display = 'none';
          if (selectedKey !== getPrimaryKey()) window.location.reload();
        };
      }

      function attachRowEvents() {
        el.querySelectorAll('label[data-key]').forEach(function(lbl) {
          lbl.addEventListener('click', function() {
            selectedKey = lbl.dataset.key;
            el.querySelector('#gp-rows').innerHTML = SERVERS.map(rowHtml).join('');
            attachRowEvents();
          });
        });
      }

      document.body.appendChild(el);
      el.addEventListener('click', function(e) { if (e.target === el) el.style.display = 'none'; });
      render();
      return el;
    }

    /* 3. 전역 트리거 */
    window.__govpressShowSettings = function() {
      var panel = document.getElementById(PANEL_ID);
      if (panel) panel.remove();
      panel = buildPanel();
      panel.style.display = 'flex';

      /* 서버 헬스 핑 */
      var status = panel.querySelector('#gp-status');
      status.textContent = '서버 상태 확인 중…';
      var done = 0, msgs = {};
      SERVERS.forEach(function(s) {
        var ac = new AbortController();
        setTimeout(function() { ac.abort(); }, 3000);
        fetch(s.url + '/health', { signal: ac.signal })
          .then(function(r) { msgs[s.key] = r.ok ? '✅' : '❌'; })
          .catch(function()  { msgs[s.key] = '❌'; })
          .finally(function() {
            done++;
            if (done === SERVERS.length)
              status.textContent = SERVERS.map(function(s) {
                return s.label + ' ' + (msgs[s.key] || '…');
              }).join('  |  ');
          });
      });
    };
  })();
  /* ────────────────────────────────────────────────────────────────── */
  </script>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>

    <div id="root"></div>
  <script src="/GovPress_PDF_MD/_expo/static/js/web/AppEntry-b291aa318cf1c18be69ab2d3d8fdc194.js?v=20260403-1" defer></script>
</body>
</html>
