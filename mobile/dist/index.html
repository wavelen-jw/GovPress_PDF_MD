<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>GovPress Mobile</title>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  <script>
  /* ── GovPress dual-server fallback ──────────────────────────────────── */
  (function () {
    'use strict';

    var SERVERS = [
      { key: 'wsl', label: 'WSL 서버',  url: 'https://api.govpress.cloud' },
      { key: 'vps', label: 'VPS 서버',  url: 'https://api2.govpress.cloud' }
    ];
    var KEYS = {
      primary: 'govpress.server.primary',   // 'wsl' | 'vps'
      appBase: 'govpress.mobile.baseUrl'
    };

    function getPrimaryKey() { return localStorage.getItem(KEYS.primary) || 'wsl'; }
    function getPrimaryUrl() {
      var k = getPrimaryKey();
      return (SERVERS.find(function(s){ return s.key===k; }) || SERVERS[0]).url;
    }
    function getFallbackUrl() {
      var k = getPrimaryKey();
      return (SERVERS.find(function(s){ return s.key!==k; }) || SERVERS[1]).url;
    }

    /* 1. localStorage.getItem 가로채기 ─────────────────────────────── */
    var _origGet = Storage.prototype.getItem;
    Storage.prototype.getItem = function (key) {
      if (key === KEYS.appBase) return getPrimaryUrl();
      return _origGet.call(this, key);
    };

    /* 2. 서버 설정 패널 ─────────────────────────────────────────────── */
    var PANEL_ID = 'gp-server-panel';

    function buildPanel() {
      var el = document.createElement('div');
      el.id = PANEL_ID;
      el.setAttribute('style', 'position:fixed;inset:0;z-index:99999;display:none;' +
        'justify-content:center;align-items:center;background:rgba(34,25,18,.45)');

      function render() {
        var pk = getPrimaryKey();
        el.innerHTML = [
          '<div style="width:min(420px,90vw);background:#fff8f1;border:1px solid #e3d1ba;',
            'border-radius:20px;padding:22px 20px;box-shadow:0 8px 32px rgba(0,0,0,.18);',
            'font-family:system-ui,sans-serif">',

          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">',
            '<span style="font-size:14px;font-weight:800;color:#7b664f">서버 설정</span>',
            '<button id="gp-close" style="background:none;border:none;cursor:pointer;',
              'font-size:20px;color:#7b664f;padding:0 4px">✕</button>',
          '</div>',

          SERVERS.map(function(s) {
            var isPrimary = s.key === pk;
            return [
              '<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;',
                'background:', isPrimary ? '#fff0e0' : '#f5ede2', ';',
                'border:1.5px solid ', isPrimary ? '#d4a36a' : 'transparent', ';',
                'border-radius:12px;margin-bottom:8px">',
                '<div style="width:14px;height:14px;border-radius:50%;flex-shrink:0;',
                  'background:', isPrimary ? '#c07a30' : 'transparent', ';',
                  'border:2px solid ', isPrimary ? '#c07a30' : '#bba88a', '"></div>',
                '<div style="flex:1">',
                  '<div style="font-size:13px;font-weight:700;color:', isPrimary ? '#2f2318' : '#7b664f', '">',
                    s.label,
                  '</div>',
                  '<div style="font-size:11px;color:#9a856e;margin-top:2px">', s.url, '</div>',
                '</div>',
                '<span style="font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;',
                  'background:', isPrimary ? '#d4a36a' : '#c8baa8', ';color:white">',
                  isPrimary ? '기본' : '대체',
                '</span>',
              '</div>'
            ].join('');
          }).join(''),

          '<button id="gp-swap" style="width:100%;padding:12px;margin-top:4px;',
            'background:#f0e4d0;border:1px solid #d2b48b;border-radius:12px;',
            'font-size:14px;font-weight:700;color:#5a3e2a;cursor:pointer">',
            '⇄ 기본 ↔ 대체 전환 후 저장',
          '</button>',

          '<div id="gp-status" style="font-size:11px;color:#9e8676;margin-top:10px;',
            'text-align:center"></div>',
          '</div>'
        ].join('');

        el.querySelector('#gp-close').onclick = function() { el.style.display='none'; };
        el.querySelector('#gp-swap').onclick = function() {
          var newKey = getPrimaryKey() === 'wsl' ? 'vps' : 'wsl';
          localStorage.setItem(KEYS.primary, newKey);
          window.location.reload();
        };
      }

      document.body.appendChild(el);
      el.addEventListener('click', function(e) { if (e.target===el) el.style.display='none'; });
      render();
      return el;
    }

    /* 3. 전역 트리거 ────────────────────────────────────────────────── */
    window.__govpressShowSettings = function() {
      var panel = document.getElementById(PANEL_ID);
      if (panel) panel.remove();
      panel = buildPanel();
      panel.style.display = 'flex';

      /* 서버 상태 핑 */
      var status = panel.querySelector('#gp-status');
      status.textContent = '서버 상태 확인 중…';
      var results = {};
      function check(s) {
        var ac = new AbortController();
        setTimeout(function(){ ac.abort(); }, 3000);
        fetch(s.url + '/health', {signal: ac.signal})
          .then(function(r){ results[s.key] = r.ok; })
          .catch(function(){ results[s.key] = false; })
          .finally(function(){
            if (Object.keys(results).length === SERVERS.length) {
              status.textContent = SERVERS.map(function(s){
                return s.label + ': ' + (results[s.key] ? '✅' : '❌');
              }).join('  |  ');
            }
          });
      }
      SERVERS.forEach(check);
    };
  })();
  /* ────────────────────────────────────────────────────────────────── */
  </script>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  <script src="/GovPress_PDF_MD/_expo/static/js/web/AppEntry-b291aa318cf1c18be69ab2d3d8fdc194.js?v=20260403-1" defer></script>
</body>
</html>
