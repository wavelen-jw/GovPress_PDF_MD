<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>GovPress PDF MD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Toolbar ─────────────────────────────────────────── -->
  <div id="toolbar">
    <button class="btn" id="btn-open" title="PDF 열기 (Ctrl+O)">
      <!-- folder-open icon -->
      <svg viewBox="0 0 20 20" fill="currentColor">
        <path d="M2 6a2 2 0 012-2h3.586a1 1 0 01.707.293L9.707 5.707A1 1 0 0010.414 6H16a2 2 0 012 2v2H2V6z"/>
        <path d="M0 10a2 2 0 012-2h16a2 2 0 012 2v4a2 2 0 01-2 2H2a2 2 0 01-2-2v-4z" opacity=".7"/>
      </svg>
      PDF 열기
    </button>
    <button class="btn" id="btn-save" title="저장 (Ctrl+S)" disabled>
      <!-- floppy disk icon -->
      <svg viewBox="0 0 20 20" fill="currentColor">
        <path d="M4 2a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V6.414a1 1 0 00-.293-.707l-3.414-3.414A1 1 0 0013.586 2H4zm5 1v4H7V3h2zm5 10a2 2 0 11-4 0 2 2 0 014 0zM7 3h1v4H6V3h1z"/>
        <path d="M6 3h7v4H6V3z" opacity=".5"/>
      </svg>
      저장
    </button>
    <button class="btn" id="btn-copy" title="클립보드 복사 (Ctrl+Shift+C)" disabled>
      <!-- clipboard icon -->
      <svg viewBox="0 0 20 20" fill="currentColor">
        <path d="M8 2a1 1 0 000 2h4a1 1 0 100-2H8z"/>
        <path d="M6 4a2 2 0 00-2 2v9a2 2 0 002 2h8a2 2 0 002-2V6a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/>
      </svg>
      복사
    </button>
    <div class="sep"></div>
    <div class="btn-group" id="view-toggle">
      <button class="btn toggle" id="btn-source" title="소스 편집기만 표시 (Ctrl+1)">
        <!-- code brackets </> -->
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M7.707 5.293a1 1 0 010 1.414L5.414 9l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm4.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 01-1.414-1.414L14.586 9l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
        </svg>
        소스
      </button>
      <button class="btn toggle active" id="btn-split" title="분할 보기 (Ctrl+2)">
        <!-- two-column split icon -->
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M3 4a1 1 0 011-1h12a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm8 1v10h4V5h-4zM4 5v10h6V5H4z" clip-rule="evenodd"/>
        </svg>
        분할
      </button>
      <button class="btn toggle" id="btn-preview" title="미리보기만 표시 (Ctrl+3)">
        <!-- eye icon -->
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path d="M10 3C5.5 3 1.7 5.9.2 10c1.5 4.1 5.3 7 9.8 7s8.3-2.9 9.8-7C18.3 5.9 14.5 3 10 3zm0 12a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/>
        </svg>
        미리보기
      </button>
    </div>
    <div class="sep"></div>
    <label class="follow-label" title="커서 위치를 미리보기에 동기화 (Ctrl+Shift+F)">
      <input type="checkbox" id="follow-cursor" checked> 커서 동기화
    </label>
    <div class="spacer"></div>
    <span id="status-file"></span>
    <span id="status-msg">준비</span>
    <div class="sep"></div>
    <button class="btn" id="btn-info" title="정보">
      <!-- info circle icon -->
      <svg viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 2a8 8 0 100 16A8 8 0 0010 2zm0 3a1 1 0 110 2 1 1 0 010-2zm0 4a1 1 0 011 1v3a1 1 0 11-2 0v-3a1 1 0 011-1z" clip-rule="evenodd"/>
      </svg>
    </button>
  </div>

  <!-- ── Main area ────────────────────────────────────────── -->
  <div id="main">
    <div id="editor-pane">
      <textarea id="editor"
        placeholder="PDF를 열거나 드래그하면 Markdown이 여기에 표시됩니다."
        spellcheck="false"
        autocorrect="off"
        autocapitalize="off"
      ></textarea>
    </div>

    <div id="divider" title="드래그하여 크기 조절"></div>

    <div id="preview-pane">
      <div id="preview-scroll">
        <div id="preview-content">
          <!-- welcome -->
          <div id="welcome">
            <div class="wl-icon">&#128196;</div>
            <h2>GovPress PDF MD</h2>
            <p class="wl-sub">정부 보도자료 PDF → Markdown 변환기</p>
            <div class="wl-shortcuts">
              <div class="wl-row"><kbd>Ctrl+O</kbd><span>PDF 파일 열기</span></div>
              <div class="wl-row"><span class="wl-or">또는 PDF를 이 창에</span> <strong>드래그 앤 드롭</strong></div>
              <hr>
              <div class="wl-row"><kbd>Ctrl+S</kbd><span>Markdown 저장</span></div>
              <div class="wl-row"><kbd>Ctrl+Shift+C</kbd><span>클립보드 복사</span></div>
              <div class="wl-row"><kbd>Ctrl+1/2/3</kbd><span>소스 / 분할 / 미리보기</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Drop overlay ─────────────────────────────────────── -->
  <div id="drop-overlay" aria-hidden="true">
    <div class="drop-msg">&#128196; PDF를 놓으면 변환을 시작합니다.</div>
  </div>

  <!-- ── Info modal ───────────────────────────────────────── -->
  <div id="modal-backdrop" role="dialog" aria-modal="true" aria-label="정보">
    <div id="modal-box">
      <button id="modal-close" title="닫기" aria-label="닫기">&#10005;</button>
      <h3>&#128196; GovPress PDF MD</h3>
      <div class="modal-row"><span>버전</span>1.0.0</div>
      <div class="modal-row"><span>만든이</span>wavelen-jw</div>
      <div class="modal-row"><span>GitHub</span><a href="https://github.com/wavelen-jw/GovPress_PDF_MD" target="_blank">wavelen-jw/GovPress_PDF_MD</a></div>
      <div class="modal-row" style="margin-top:12px;color:var(--text2);font-size:12px;">정부 보도자료 PDF → Markdown 변환기</div>
    </div>
  </div>

  <script src="dev-mock.js"></script>
  <script src="app.js"></script>
</body>
</html>
