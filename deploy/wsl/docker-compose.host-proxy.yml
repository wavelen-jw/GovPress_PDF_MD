services:
  api:
    build:
      context: ../..
      dockerfile: deploy/wsl/Dockerfile
      args:
        GOVPRESS_CONVERTER_SPEC: ${GOVPRESS_CONVERTER_SPEC:-}
        GOVPRESS_CONVERTER_EXTRA_INDEX_URL: ${GOVPRESS_CONVERTER_EXTRA_INDEX_URL:-}
        GOVPRESS_CONVERTER_ALLOW_LOCAL_FALLBACK: ${GOVPRESS_CONVERTER_ALLOW_LOCAL_FALLBACK:-1}
        GOVPRESS_CONVERTER_MIN_VERSION: ${GOVPRESS_CONVERTER_MIN_VERSION:-}
    container_name: govpress-api
    command: >
      python -m uvicorn server.app.main:app
      --host 0.0.0.0 --port 8013
      --workers 1
      --timeout-keep-alive 30
    env_file:
      - .env
    environment:
      GOVPRESS_STORAGE_ROOT: /data/storage
      GOVPRESS_QC_EXPORT_ROOT: /app/exports/policy_briefing_qc
      GOVPRESS_CONVERTER_ALLOW_LOCAL_FALLBACK: ${GOVPRESS_CONVERTER_ALLOW_LOCAL_FALLBACK:-1}
    mem_limit: 256m
    volumes:
      - ../../:/app
      - ./data/storage:/data/storage
    expose:
      - "8013"
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: deploy/wsl/Dockerfile
      args:
        GOVPRESS_CONVERTER_SPEC: ${GOVPRESS_CONVERTER_SPEC:-}
        GOVPRESS_CONVERTER_EXTRA_INDEX_URL: ${GOVPRESS_CONVERTER_EXTRA_INDEX_URL:-}
        GOVPRESS_CONVERTER_ALLOW_LOCAL_FALLBACK: ${GOVPRESS_CONVERTER_ALLOW_LOCAL_FALLBACK:-1}
        GOVPRESS_CONVERTER_MIN_VERSION: ${GOVPRESS_CONVERTER_MIN_VERSION:-}
    container_name: govpress-worker
    command: >
      python -m server.run_worker
      --storage-root /data/storage
      --poll-interval 3.0
      --concurrency 1
    env_file:
      - .env
    environment:
      GOVPRESS_STORAGE_ROOT: /data/storage
      GOVPRESS_QC_EXPORT_ROOT: /app/exports/policy_briefing_qc
      GOVPRESS_CONVERTER_ALLOW_LOCAL_FALLBACK: ${GOVPRESS_CONVERTER_ALLOW_LOCAL_FALLBACK:-1}
      _JAVA_OPTIONS: "-Xms64m -Xmx256m"
    mem_limit: 512m
    volumes:
      - ../../:/app
      - ./data/storage:/data/storage
    depends_on:
      - api
    restart: unless-stopped
